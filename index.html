<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 어제 수정과 동일하게 viewport-fit=cover 포함 -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>세로 스크롤 재현 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* 어제 수정본과 동일한 패턴: html, body만 overflow:hidden */
  html, body {
    height: 100%;
    font-family: "NanumSquareRound", -apple-system, sans-serif;
    background: #e8e8e6;
    overflow: hidden;
  }

  /* 어제 수정본과 동일한 패턴: vh 먼저, dvh로 덮어쓰기 */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    background: #fff;
  }

  /* 실제 대시보드처럼 고정 px 높이를 가진 영역들 */
  .frame {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 16px;
    min-height: 0; /* 이게 없으면 flex 자식이 넘칠 때 더 잘 드러남 */
    overflow: visible; /* 의도적으로 hidden 안 줌 (production과 동일 가정) */
  }
  .left, .right { background: #f2f2f2; border-radius: 12px; }
  .left { flex: 2; padding: 16px; }
  .right { flex: 1; padding: 16px; }

  .clock { font-size: 56px; font-weight: 700; color: #222; }
  .notice { font-size: 44px; color: #555; margin: 16px 0; }

  .timetable-row, .widget-block {
    height: 64px;
    background: #fff;
    border: 1px solid #dcdcdc;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 14px;
  }

  footer.bar {
    height: 56px;
    background: #ff4600;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* 실시간 측정값 표시 패널 */
  #debug {
    position: fixed;
    bottom: 60px;
    left: 8px;
    right: 8px;
    z-index: 9999;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    font-size: 11px;
    font-family: monospace;
    padding: 8px 10px;
    border-radius: 8px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  #debug.warn { color: #ff6b35; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="frame">
    <div class="left">
      <div class="clock">14:32</div>
      <div class="notice">오늘도 좋은 하루 보내세요 :)</div>
      <div class="timetable-row">1교시 국어</div>
      <div class="timetable-row">2교시 수학</div>
      <div class="timetable-row">3교시 사회</div>
      <div class="timetable-row">4교시 과학</div>
      <div class="timetable-row">5교시 체육</div>
      <div class="timetable-row">학사일정: 현장체험학습 안내</div>
    </div>
    <div class="right">
      <div class="widget-block">위젯 1 - 타이머</div>
      <div class="widget-block">위젯 2 - 점수판</div>
      <div class="widget-block">위젯 3 - 디데이</div>
      <div class="widget-block">위젯 4 - 칭찬카드</div>
    </div>
  </div>
  <footer class="bar">하단 고정 바</footer>
</div>

<div id="debug">측정 중...</div>

<script>
  function measure() {
    const app = document.getElementById('app');
    const frame = document.querySelector('.frame');
    const dbg = document.getElementById('debug');

    const appRect = app.getBoundingClientRect();
    const docHeight = document.documentElement.scrollHeight;
    const winHeight = window.innerHeight;
    const vvHeight = window.visualViewport ? window.visualViewport.height : null;

    const isOverflowing = docHeight > winHeight + 1;

    dbg.className = isOverflowing ? 'warn' : '';
    dbg.innerText =
      `window.innerHeight: ${winHeight}px\n` +
      `visualViewport.height: ${vvHeight ? vvHeight.toFixed(1) : 'N/A'}px\n` +
      `.app 실제 높이: ${appRect.height.toFixed(1)}px\n` +
      `document.scrollHeight: ${docHeight}px\n` +
      (isOverflowing
        ? `⚠️ 문서 높이가 화면보다 ${(docHeight - winHeight).toFixed(0)}px 더 큽니다 → 스크롤 발생 가능`
        : `✅ 정상 범위 (스크롤 없음)`);
  }

  measure();
  window.addEventListener('resize', measure);
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', measure);
  }
  setInterval(measure, 500);
</script>

</body>
</html>
